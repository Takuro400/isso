<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ISSO – ドリンク出し忘れ防止</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Bebas+Neue&display=swap');

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --card: #0f3460;
    --accent: #e94560;
    --amber: #f5a623;
    --green: #2ecc71;
    --text: #eaeaea;
    --muted: #8892a4;
    --warn-yellow: #f39c12;
    --warn-red: #e74c3c;
    --edit-color: #a29bfe;
    --manual-color: #00cec9;
    --voice-color: #fd79a8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* ══ BOTTOM TAB BAR ══ */
  #tabBar {
    display: flex;
    background: var(--surface);
    border-top: 2px solid #2a3a5c;
    flex-shrink: 0;
    position: sticky;
    bottom: 0;
    z-index: 50;
  }
  .tab-btn {
    flex: 1;
    padding: 10px 4px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.68rem;
    font-weight: 700;
    cursor: pointer;
    transition: color 0.2s;
    letter-spacing: 0.03em;
  }
  .tab-btn .tab-icon { font-size: 1.3rem; line-height: 1; }
  .tab-btn.active { color: var(--accent); }
  .tab-btn.active.manual-tab { color: var(--manual-color); }

  /* ══ PAGES ══ */
  .page { display: none; flex-direction: column; flex: 1; min-height: 0; overflow: hidden; }
  .page.active { display: flex; }

  /* ── HEADER ── */
  header {
    background: var(--surface);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 2px solid var(--accent);
    flex-shrink: 0;
    transition: border-color 0.3s;
  }
  body.edit-mode header { border-color: var(--edit-color); }

  .logo { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; letter-spacing: 0.12em; color: var(--accent); }
  .logo span { color: var(--text); }
  .header-right { display: flex; align-items: center; gap: 8px; }

  .total-badge {
    background: var(--accent);
    color: #fff;
    font-size: 0.75rem;
    font-weight: 700;
    padding: 4px 10px;
    border-radius: 99px;
    display: flex; align-items: center; gap: 6px;
    transition: opacity 0.3s;
  }
  body.edit-mode .total-badge { opacity: 0.3; pointer-events: none; }
  .total-badge .num { font-family: 'Bebas Neue', sans-serif; font-size: 1.4rem; line-height: 1; }

  .btn-edit-toggle {
    border-radius: 8px; padding: 7px 13px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 0.8rem; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: background 0.2s;
    background: rgba(162,155,254,0.12); border: 1.5px solid var(--edit-color); color: var(--edit-color);
  }
  .btn-edit-toggle:active { background: rgba(162,155,254,0.28); }
  body.edit-mode .btn-edit-toggle { background: var(--edit-color); color: #1a1a2e; }

  .btn-add-card {
    border-radius: 8px; padding: 7px 11px;
    font-family: 'Noto Sans JP', sans-serif; font-size: 0.82rem; font-weight: 700;
    cursor: pointer; white-space: nowrap; display: none;
    background: rgba(46,204,113,0.15); border: 1.5px solid var(--green); color: var(--green);
  }
  body.edit-mode .btn-add-card { display: block; }
  .btn-add-card:active { background: rgba(46,204,113,0.35); }

  #editBar {
    display: none; background: rgba(162,155,254,0.1); border-bottom: 1.5px solid rgba(162,155,254,0.3);
    padding: 8px 16px; font-size: 0.8rem; font-weight: 700; color: var(--edit-color);
    text-align: center; letter-spacing: 0.05em; flex-shrink: 0;
  }
  body.edit-mode #editBar { display: block; }

  #adviceBar {
    padding: 10px 16px; font-size: 0.88rem; font-weight: 700; text-align: center;
    transition: background 0.4s, color 0.4s, opacity 0.3s; flex-shrink: 0;
    min-height: 40px; display: flex; align-items: center; justify-content: center; letter-spacing: 0.04em;
  }
  body.edit-mode #adviceBar { opacity: 0.25; pointer-events: none; }
  .advice-idle    { background: #1e3a5f; color: #74b9ff; }
  .advice-busy    { background: var(--warn-red); color: #fff; }
  .advice-warning { background: var(--warn-yellow); color: #1a1a2e; }

  /* ══ VOICE BAR ══ */
  #voiceBar {
    background: var(--surface);
    border-bottom: 2px solid #2a3a5c;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
    transition: border-color 0.3s;
  }
  #voiceBar.listening { border-color: var(--voice-color); }
  body.edit-mode #voiceBar { display: none; }

  #btnVoice {
    width: 52px; height: 52px; border-radius: 50%; flex-shrink: 0;
    font-size: 1.4rem; cursor: pointer;
    background: rgba(253,121,168,0.15); border: 2px solid var(--voice-color); color: var(--voice-color);
    display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, transform 0.1s;
    position: relative;
  }
  #btnVoice:active { transform: scale(0.93); }
  #btnVoice.listening {
    background: var(--voice-color); color: #1a1a2e;
    animation: voicePulse 1s ease-in-out infinite;
  }
  @keyframes voicePulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(253,121,168,0.5); }
    50%      { box-shadow: 0 0 0 12px rgba(253,121,168,0); }
  }

  .voice-info { flex: 1; min-width: 0; }
  .voice-label {
    font-size: 0.72rem; font-weight: 700; color: var(--muted);
    letter-spacing: 0.05em; margin-bottom: 3px;
  }
  #voiceStatus {
    font-size: 0.85rem; font-weight: 700; color: var(--text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  #voiceStatus.idle { color: var(--muted); font-weight: 400; }
  #voiceStatus.listening { color: var(--voice-color); }
  #voiceStatus.success { color: var(--green); }
  #voiceStatus.error { color: var(--warn-red); }

  /* result chips */
  #voiceResult {
    display: flex; flex-wrap: wrap; gap: 5px;
    padding: 0 14px 8px;
    flex-shrink: 0;
  }
  #voiceResult:empty { display: none; }
  body.edit-mode #voiceResult { display: none; }
  .result-chip {
    background: rgba(46,204,113,0.15);
    border: 1.5px solid var(--green);
    color: var(--green);
    border-radius: 99px;
    padding: 4px 12px;
    font-size: 0.8rem;
    font-weight: 700;
    animation: chipIn 0.25s ease-out;
  }
  @keyframes chipIn {
    from { opacity:0; transform: scale(0.8); }
    to   { opacity:1; transform: scale(1); }
  }
  .result-chip.unmatched {
    background: rgba(231,76,60,0.12); border-color: var(--warn-red); color: var(--warn-red);
  }

  /* ── DRINK GRID ── */
  #drinkGrid {
    flex: 1; display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 10px; padding: 10px; overflow-y: auto;
  }

  .drink-card {
    background: var(--card); border-radius: 16px; padding: 14px 10px 10px;
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    position: relative; border: 2px solid transparent;
    transition: border-color 0.3s, box-shadow 0.3s, background 0.3s;
    min-height: 180px; user-select: none; overflow: hidden;
  }
  .drink-card.warn-yellow { border-color: var(--warn-yellow); animation: pulseYellow 1.4s ease-in-out infinite; }
  .drink-card.warn-red    { border-color: var(--warn-red);    animation: pulseRed 0.9s ease-in-out infinite; }
  .drink-card.voice-hit   { border-color: var(--green) !important; animation: voiceHit 0.6s ease-out !important; }
  @keyframes pulseYellow {
    0%,100% { box-shadow:0 0 0 0 rgba(243,156,18,0); background:var(--card); }
    50%      { box-shadow:0 0 18px 6px rgba(243,156,18,0.45); background:#2a2200; }
  }
  @keyframes pulseRed {
    0%,100% { box-shadow:0 0 0 0 rgba(231,76,60,0); background:var(--card); }
    50%      { box-shadow:0 0 22px 8px rgba(231,76,60,0.55); background:#2d0a09; }
  }
  @keyframes voiceHit {
    0%   { box-shadow:0 0 0 0 rgba(46,204,113,0.9); background:#0a2d1a; }
    100% { box-shadow:0 0 30px 10px rgba(46,204,113,0); background:var(--card); }
  }

  body.edit-mode .drink-card {
    border-color: rgba(162,155,254,0.4) !important; animation: none !important;
    background: #151530 !important; box-shadow: none !important; min-height: 190px;
  }
  body.edit-mode .card-normal { display: none !important; }
  .card-edit { display: none; }
  body.edit-mode .card-edit { display: flex; }

  .drink-icon { font-size: 2.2rem; line-height: 1; }
  .drink-name { font-size: 0.92rem; font-weight: 700; text-align: center; letter-spacing: 0.02em; }
  .count-display { font-family: 'Bebas Neue', sans-serif; font-size: 3.8rem; line-height: 1; transition: color 0.3s; }
  .count-display.zero { color: var(--muted); }
  .count-display.has-count { color: var(--amber); }

  .btn-order {
    width: 100%; background: rgba(233,69,96,0.15); border: 1.5px solid var(--accent); color: var(--accent);
    border-radius: 8px; padding: 7px 4px; font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: background 0.15s;
    margin-top: auto; letter-spacing: 0.04em;
  }
  .btn-order:active { background: rgba(233,69,96,0.35); }
  .btn-done {
    width: 100%; background: rgba(46,204,113,0.15); border: 1.5px solid var(--green); color: var(--green);
    border-radius: 8px; padding: 7px 4px; font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.78rem; font-weight: 700; cursor: pointer; transition: background 0.15s; letter-spacing: 0.04em;
  }
  .btn-done:active { background: rgba(46,204,113,0.35); }

  .timers-area { display: flex; flex-wrap: wrap; gap: 4px; justify-content: center; min-height: 18px; }
  .timer-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--green); }
  .timer-dot.yellow { background: var(--warn-yellow); }
  .timer-dot.red    { background: var(--warn-red); }

  @keyframes bump { 0%{transform:scale(1)} 40%{transform:scale(1.25)} 100%{transform:scale(1)} }
  .bump { animation: bump 0.25s ease-out; }

  /* edit layout */
  .card-edit { flex-direction: column; align-items: center; gap: 8px; width: 100%; }
  .edit-top-row { display: flex; align-items: center; justify-content: space-between; width: 100%; gap: 6px; }
  .move-btns { display: flex; flex-direction: column; gap: 4px; }
  .btn-move {
    background: rgba(255,255,255,0.06); border: 1px solid #3a4a6c; color: var(--muted);
    border-radius: 6px; width: 28px; height: 26px; font-size: 0.65rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
  }
  .btn-move:active { background: rgba(255,255,255,0.18); color: var(--text); }
  .btn-move:disabled { opacity: 0.22; pointer-events: none; }
  .icon-btn {
    font-size: 2rem; background: rgba(162,155,254,0.1); border: 1.5px dashed var(--edit-color);
    border-radius: 10px; width: 52px; height: 52px;
    display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; position: relative;
  }
  .icon-btn::after { content:'✏️'; font-size:0.6rem; position:absolute; bottom:2px; right:2px; }
  .icon-btn:active { background: rgba(162,155,254,0.25); }
  .btn-delete {
    background: rgba(231,76,60,0.12); border: 1.5px solid var(--warn-red); color: var(--warn-red);
    border-radius: 8px; width: 36px; height: 36px; font-size: 1rem;
    cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .btn-delete:active { background: rgba(231,76,60,0.3); }
  .name-input {
    width: 100%; background: rgba(255,255,255,0.06); border: 1.5px solid rgba(162,155,254,0.4);
    border-radius: 8px; color: var(--text); font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem; font-weight: 700; padding: 8px 10px; outline: none; text-align: center;
  }
  .name-input:focus { border-color: var(--edit-color); }

  /* ══ MANUAL PAGE ══ */
  .manual-header { background: var(--surface); padding: 14px 16px 10px; border-bottom: 2px solid var(--manual-color); flex-shrink: 0; }
  .manual-header-title { font-size: 1.1rem; font-weight: 900; color: var(--manual-color); letter-spacing: 0.06em; margin-bottom: 10px; }
  .search-wrap {
    display: flex; align-items: center; gap: 8px;
    background: rgba(255,255,255,0.06); border: 1.5px solid rgba(0,206,201,0.4);
    border-radius: 12px; padding: 8px 14px;
  }
  .search-wrap input { flex:1; background:none; border:none; outline:none; color:var(--text); font-family:'Noto Sans JP',sans-serif; font-size:1rem; font-weight:700; }
  .search-wrap input::placeholder { color:var(--muted); font-weight:400; }
  .search-icon { font-size: 1.1rem; color: var(--muted); }
  .btn-clear-search { background:none; border:none; color:var(--muted); font-size:1rem; cursor:pointer; padding:0; display:none; }
  .btn-clear-search.visible { display: block; }
  .cat-tabs { display:flex; gap:6px; overflow-x:auto; padding:10px 16px 0; flex-shrink:0; scrollbar-width:none; }
  .cat-tabs::-webkit-scrollbar { display:none; }
  .cat-tab {
    background:rgba(255,255,255,0.06); border:1.5px solid #2a3a5c; color:var(--muted);
    border-radius:99px; padding:5px 14px; font-family:'Noto Sans JP',sans-serif;
    font-size:0.78rem; font-weight:700; cursor:pointer; white-space:nowrap; transition:all 0.15s;
  }
  .cat-tab.active { background:rgba(0,206,201,0.15); border-color:var(--manual-color); color:var(--manual-color); }
  #manualList { flex:1; overflow-y:auto; padding:10px 12px 16px; display:flex; flex-direction:column; gap:8px; }
  .manual-card { background:var(--surface); border-radius:14px; border:1.5px solid #2a3a5c; overflow:hidden; transition:border-color 0.2s; }
  .manual-card.highlight { border-color:var(--manual-color); }
  .manual-card-head { display:flex; align-items:center; justify-content:space-between; padding:13px 16px; cursor:pointer; gap:10px; }
  .manual-card-head:active { background:rgba(255,255,255,0.04); }
  .manual-title-row { display:flex; align-items:center; gap:10px; }
  .manual-emoji { font-size:1.4rem; line-height:1; flex-shrink:0; }
  .manual-name { font-size:1rem; font-weight:700; letter-spacing:0.02em; }
  .manual-cat-badge { font-size:0.65rem; font-weight:700; padding:2px 8px; border-radius:99px; background:rgba(255,255,255,0.08); color:var(--muted); white-space:nowrap; flex-shrink:0; }
  .manual-arrow { color:var(--muted); font-size:0.75rem; transition:transform 0.2s; flex-shrink:0; }
  .manual-card.open .manual-arrow { transform:rotate(90deg); }
  .manual-body { display:none; padding:0 16px 14px; border-top:1px solid #2a3a5c; }
  .manual-card.open .manual-body { display:block; }
  .manual-steps { list-style:none; display:flex; flex-direction:column; gap:6px; padding-top:12px; }
  .manual-steps li { display:flex; gap:10px; align-items:flex-start; font-size:0.9rem; line-height:1.6; }
  .step-num { background:var(--manual-color); color:#0a2020; border-radius:50%; width:22px; height:22px; font-size:0.72rem; font-weight:900; display:flex; align-items:center; justify-content:center; flex-shrink:0; margin-top:2px; }
  mark { background:rgba(245,166,35,0.35); color:var(--amber); border-radius:3px; padding:0 2px; }
  .no-result { text-align:center; color:var(--muted); font-size:0.9rem; padding:40px 20px; }

  /* ══ EMOJI MODAL ══ */
  #emojiModal { display:none; position:fixed; inset:0; z-index:100; background:rgba(10,10,20,0.82); align-items:flex-end; justify-content:center; }
  #emojiModal.open { display:flex; }
  .emoji-panel { background:var(--surface); border-radius:20px 20px 0 0; padding:16px; width:100%; max-height:60dvh; display:flex; flex-direction:column; gap:12px; border-top:2px solid var(--edit-color); }
  .emoji-panel-title { font-size:0.9rem; font-weight:700; color:var(--muted); text-align:center; }
  .emoji-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:8px; overflow-y:auto; flex:1; }
  .emoji-choice { font-size:1.7rem; text-align:center; padding:6px 0; border-radius:10px; cursor:pointer; background:rgba(255,255,255,0.04); border:1.5px solid transparent; line-height:1.3; }
  .emoji-choice:active { background:rgba(255,255,255,0.18); border-color:var(--edit-color); }
  .btn-close-emoji { background:rgba(255,255,255,0.07); border:1.5px solid var(--muted); color:var(--muted); border-radius:10px; padding:10px; font-family:'Noto Sans JP',sans-serif; font-size:0.9rem; font-weight:700; cursor:pointer; width:100%; }

  /* ── TOAST ── */
  #toast {
    position:fixed; bottom:70px; left:50%; transform:translateX(-50%) translateY(20px);
    background:#2ecc71; color:#0a2e1a; padding:10px 22px; border-radius:99px;
    font-weight:700; font-size:0.88rem; opacity:0; transition:opacity 0.3s, transform 0.3s;
    pointer-events:none; z-index:200; white-space:nowrap;
  }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── NO SUPPORT ── */
  #noSupportMsg { display:none; font-size:0.75rem; color:var(--warn-red); font-weight:700; }
</style>
</head>
<body>

<!-- ══ DRINK PAGE ══ -->
<div id="pageDrink" class="page active">
  <header>
    <div class="logo">IS<span>SO</span></div>
    <div class="header-right">
      <div class="total-badge">未提供&nbsp;<span class="num" id="totalCount">0</span></div>
      <button class="btn-add-card" id="btnAddCard">＋ 追加</button>
      <button class="btn-edit-toggle" id="btnEditToggle">✏️ 編集</button>
    </div>
  </header>

  <div id="editBar">✏️ 編集モード ― アイコン・名前・並び順を変更できます</div>
  <div id="adviceBar" class="advice-idle">☕ 今のうちにジョッキを洗ってください</div>

  <!-- VOICE BAR -->
  <div id="voiceBar">
    <button id="btnVoice" title="音声入力">🎤</button>
    <div class="voice-info">
      <div class="voice-label">音声入力 — 例：「生2、ハイボール1」</div>
      <div id="voiceStatus" class="idle">マイクボタンを押して話してください</div>
      <div id="noSupportMsg">⚠️ このブラウザは音声入力に非対応です</div>
    </div>
  </div>
  <div id="voiceResult"></div>

  <div id="drinkGrid"></div>
</div>

<!-- ══ MANUAL PAGE ══ -->
<div id="pageManual" class="page">
  <div class="manual-header">
    <div class="manual-header-title">📋 マニュアル</div>
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="料理名・手順を検索…">
      <button class="btn-clear-search" id="btnClearSearch">✕</button>
    </div>
  </div>
  <div class="cat-tabs" id="catTabs"></div>
  <div id="manualList"></div>
</div>

<!-- ══ TAB BAR ══ -->
<div id="tabBar">
  <button class="tab-btn active" id="tabDrink" onclick="switchTab('drink')">
    <span class="tab-icon">🍺</span>ドリンク
  </button>
  <button class="tab-btn manual-tab" id="tabManual" onclick="switchTab('manual')">
    <span class="tab-icon">📋</span>マニュアル
  </button>
</div>

<!-- EMOJI MODAL -->
<div id="emojiModal">
  <div class="emoji-panel">
    <div class="emoji-panel-title">アイコンを選んでください</div>
    <div class="emoji-grid" id="emojiGrid"></div>
    <button class="btn-close-emoji" id="btnCloseEmoji">キャンセル</button>
  </div>
</div>
<div id="toast"></div>

<script>
/* ══════════════════════════════════════
   MANUAL DATA
══════════════════════════════════════ */
const MANUAL_DATA = [
  { id:'yamaimo',  name:'山芋鉄板',       emoji:'🥘', category:'料理',
    steps:['山芋1人分180g、卵は1人分で半個を用意','鉄板にバターを塗る','山芋を入れて、チーズを入れる','アルミホイルを貼って、串で止める','火を強めて5分にセット','提供時：かつお節・青のり・ソース（赤）・マヨネーズを出す','取り皿を人数分用意する','牛すじは柚子胡椒を添える'] },

    const card=document.createElement('div');
    card.className='drink-card'; card.id='card-'+drink.id;
    card.innerHTML=`
      <div class="drink-icon card-normal">${drink.icon}</div>
      <div class="drink-name card-normal">${esc(drink.name)}</div>
      <div class="count-display zero card-normal" id="count-${drink.id}">0</div>
      <div class="timers-area card-normal" id="timers-${drink.id}"></div>
      <button class="btn-order card-normal" data-id="${drink.id}">＋ 注文</button>
      <button class="btn-done  card-normal" data-id="${drink.id}">✓ 提供完了</button>
      <div class="card-edit" style="flex-direction:column;align-items:center;gap:8px;width:100%;">
        <div class="edit-top-row">
          <div class="move-btns">
            <button class="btn-move btn-up" data-id="${drink.id}" ${idx===0?'disabled':''}>▲</button>
            <button class="btn-move btn-dn" data-id="${drink.id}" ${idx===drinks.length-1?'disabled':''}>▼</button>
          </div>
          <button class="icon-btn" data-id="${drink.id}">${drink.icon}</button>
          <button class="btn-delete" data-id="${drink.id}">🗑</button>
        </div>
        <input class="name-input" type="text" value="${esc(drink.name)}" data-id="${drink.id}" maxlength="10" placeholder="ドリンク名">

document.getElementById('drinkGrid').addEventListener('click', e=>{
  if(editMode){
    const up=e.target.closest('.btn-up');
    if(up){ collectNameEdits(); const i=drinks.findIndex(d=>d.id===up.dataset.id); if(i>0)[drinks[i-1],drinks[i]]=[drinks[i],drinks[i-1]]; rebuildGrid(); return; }
    const dn=e.target.closest('.btn-dn');
    if(dn){ collectNameEdits(); const i=drinks.findIndex(d=>d.id===dn.dataset.id); if(i<drinks.length-1)[drinks[i],drinks[i+1]]=[drinks[i+1],drinks[i]]; rebuildGrid(); return; }
    const del=e.target.closest('.btn-delete');
    if(del){ if(drinks.length<=1){showToast('最低1つは必要です');return;} collectNameEdits(); drinks=drinks.filter(d=>d.id!==del.dataset.id); rebuildGrid(); return; }
    const icon=e.target.closest('.icon-btn');
    if(icon){ openEmojiPicker(icon.dataset.id); return; }
  } else {
    const ob=e.target.closest('.btn-order'); if(ob){ addOrder(ob.dataset.id); return; }
    const db=e.target.closest('.btn-done');  if(db){ markDone(db.dataset.id);  return; }
  }
});

function addOrder(id, count=1) {
  const s=runtime[id]; if(!s) return;
  for(let i=0;i<count;i++) s.orders.push({orderedAt:Date.now()});
  s.count+=count;
  renderCard(id); renderTotal(); updateAdvice();
  // flash card green
  const card=document.getElementById('card-'+id);
  if(card){ card.classList.remove('voice-hit'); void card.offsetWidth; card.classList.add('voice-hit'); setTimeout(()=>card.classList.remove('voice-hit'),700); }
}
function markDone(id) {
  const s=runtime[id]; if(!s||s.count<=0) return;
  s.count--; s.orders.shift();
  renderCard(id); renderTotal(); updateAdvice();
}
function renderCard(id) {
  const s=runtime[id], el=document.getElementById('count-'+id), card=document.getElementById('card-'+id), tArea=document.getElementById('timers-'+id);
  if(!s||!el||!card||!tArea) return;
  el.textContent=s.count;
  el.className='count-display card-normal '+(s.count===0?'zero':'has-count');
  el.classList.remove('bump'); void el.offsetWidth; if(s.count>0) el.classList.add('bump');
  const now=Date.now(); tArea.innerHTML='';
  s.orders.forEach(o=>{ const d=document.createElement('div'); d.className='timer-dot'+(now-o.orderedAt>=WARN_RED_MS?' red':now-o.orderedAt>=WARN_YELLOW_MS?' yellow':''); tArea.appendChild(d); });
  const mx=s.orders.reduce((m,o)=>Math.max(m,now-o.orderedAt),0);
  card.classList.remove('warn-yellow','warn-red');
  if(!editMode&&s.count>0){ if(mx>=WARN_RED_MS) card.classList.add('warn-red'); else if(mx>=WARN_YELLOW_MS) card.classList.add('warn-yellow'); }
}
function renderTotal() {
  document.getElementById('totalCount').textContent=drinks.reduce((s,d)=>s+(runtime[d.id]?.count||0),0);
}
function updateAdvice() {
  const bar=document.getElementById('adviceBar');
  const total=drinks.reduce((s,d)=>s+(runtime[d.id]?.count||0),0);
  const now=Date.now();
  const hasRed=drinks.some(d=>(runtime[d.id]?.orders||[]).some(o=>now-o.orderedAt>=WARN_RED_MS));
  bar.className='';
  if(total===0){ bar.className='advice-idle'; bar.textContent='☕ 今のうちにジョッキを洗ってください'; }
  else if(total>=3||hasRed){ bar.className='advice-busy'; bar.textContent='🚨 ドリンク作成を最優先してください！'; }
  else{ bar.className='advice-warning'; bar.textContent='⚡ ドリンクの注文が入っています！早めに対応しましょう'; }
}

const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
let recognition = null;
let isListening = false;

const btnVoice    = document.getElementById('btnVoice');
const voiceStatus = document.getElementById('voiceStatus');
const voiceResult = document.getElementById('voiceResult');
const noSupport   = document.getElementById('noSupportMsg');
const voiceBar    = document.getElementById('voiceBar');

if (!SpeechRecognition) {
  btnVoice.disabled = true;
  btnVoice.style.opacity = '0.3';
  noSupport.style.display = 'block';
  voiceStatus.style.display = 'none';
} else {
  recognition = new SpeechRecognition();
  recognition.lang = 'ja-JP';
  recognition.interimResults = true;
  recognition.maxAlternatives = 3;
  recognition.continuous = false;

  recognition.onstart = () => {
    isListening = true;
    btnVoice.classList.add('listening');
    voiceBar.classList.add('listening');
    voiceStatus.className = 'listening';
    voiceStatus.textContent = '🎤 聞いています…';
    voiceResult.innerHTML = '';
  };

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results)
      .map(r => r[0].transcript).join('');
    voiceStatus.textContent = '「' + transcript + '」';
    if (e.results[0].isFinal) parseVoiceOrder(transcript);
  };

  recognition.onerror = (e) => {
    stopListening();
    voiceStatus.className = 'error';
    voiceStatus.textContent = e.error === 'no-speech' ? '音声が聞き取れませんでした' : 'エラー: ' + e.error;
  };

  recognition.onend = () => { stopListening(); };

  btnVoice.addEventListener('click', () => {
    if (isListening) { recognition.stop(); stopListening(); }
    else { try { recognition.start(); } catch(e){} }
  });
}

function stopListening() {
  isListening = false;
  btnVoice.classList.remove('listening');
  voiceBar.classList.remove('listening');
  if (voiceStatus.className === 'listening') {
    voiceStatus.className = 'idle';
    voiceStatus.textContent = 'マイクボタンを押して話してください';
  }
}

/* ══════════════════════════════════════
   VOICE PARSER  v2
   ─────────────────────────────────────
   方針:
   1. 漢数字・読み数字を先に変換（ただし飲み物名に含まれる音は除外）
   2. 飲み物名を長い順にマッチ（ハイボール→ハイ の順で誤爆防止）
   3. 飲み物名の直後の数字だけを使う（前後4文字以内）
   4. 確認モーダルを出してから反映（誤認識を防ぐ）
══════════════════════════════════════ */

// 全エイリアスマスター（読み方のバリエーション）
const DRINK_ALIASES = {
  beer:     ['生ビール','なまびーる','なまびる','生びーる','生びる','なまビール','なま','生'],
  highball: ['ハイボール','はいぼーる','はいぼる','ハイボ','はいぼ'],
  lemon:    ['レモンサワー','れもんさわー','レモサワー','れもさわー','レモン','れもん'],
  shochu:   ['焼酎ロック','しょうちゅうろっく','焼酎','しょうちゅう','ロック','ろっく'],
  wine:     ['ワイン','わいん','赤ワイン','白ワイン'],
  oolong:   ['ウーロン茶','うーろんちゃ','ウーロン','うーろん','烏龍茶','烏龍'],
};

// 数字変換テーブル（読みが飲み物名と被らないよう、単独の読みのみ）
const NUM_MAP = [
  // 漢数字（先に変換）
  {re:/十/g,  v:'10'},
  {re:/九/g,  v:'9'},
  {re:/八/g,  v:'8'},
  {re:/七/g,  v:'7'},
  {re:/六/g,  v:'6'},
  {re:/五/g,  v:'5'},
  {re:/四/g,  v:'4'},
  {re:/三/g,  v:'3'},
  {re:/二/g,  v:'2'},
  {re:/一/g,  v:'1'},
  // ひらがな読み（境界付きで誤爆防止）
  {re:/じゅう/g, v:'10'},
  {re:/きゅう/g, v:'9'},
  {re:/はち/g,   v:'8'},
  {re:/なな/g,   v:'7'},
  {re:/しち/g,   v:'7'},
  {re:/ろく/g,   v:'6'},
  {re:/ごほん/g, v:'5本'}, // 「5本」を保護
  {re:/ご(?!ざ|め|ろ)/g, v:'5'}, // 「ございます」などは除く
  {re:/よん/g,   v:'4'},
  {re:/さん(?!ぽ|が|び)/g, v:'3'}, // 「さんぽ」などは除く
  {re:/に(?=つ|はい|ほん|本|杯|個)/g, v:'2'}, // 助数詞の前のみ
  {re:/いち(?=つ|ほん|本|杯|個)/g, v:'1'},
];

let pendingOrders = []; // 確認待ちの注文

function parseVoiceOrder(rawText) {
  voiceResult.innerHTML = '';
  pendingOrders = [];

  // ── Step1: テキストを正規化 ──
  let text = rawText;

  // 不要語を削除
  text = text.replace(/を|が|で|は|の|お願いします|ください|ちょうだい|頼みます/g, ' ');

  // 助数詞を数字に統合（例:「2杯」→「2 」）
  text = text.replace(/(\d+)\s*[杯本個つ缶]/g, '$1 ');

  // 漢数字・読み数字を変換
  NUM_MAP.forEach(({re, v}) => { text = text.replace(re, v); });

  // 全角数字 → 半角
  text = text.replace(/[０-９]/g, c => String.fromCharCode(c.charCodeAt(0) - 0xFEE0));

  const lower = text.toLowerCase();

  // ── Step2: 飲み物をマッチ（長い名前優先） ──
  // 現在登録されている飲み物のエイリアスを構築
  const aliasMap = [];
  drinks.forEach(d => {
    // デフォルトエイリアス or 保存済みエイリアス
    const baseAliases = DRINK_ALIASES[d.id] || [];
    const saved = (d.aliases || []).filter(a => a.length > 0);
    const all = [...new Set([d.name, ...baseAliases, ...saved])];
    // 長い順にソート（誤爆防止）
    all.sort((a,b) => b.length - a.length);
    aliasMap.push({ id: d.id, name: d.name, aliases: all });
  });

  // 各飲み物について最初にマッチしたエイリアス位置を記録
  const matches = []; // {id, name, aliasLen, pos, count}
  const usedPositions = new Set();

  aliasMap.forEach(drink => {
    for (const alias of drink.aliases) {
      const al = alias.toLowerCase();
      let pos = lower.indexOf(al);
      if (pos === -1) continue;
      // すでに別の飲み物でカバーされた範囲はスキップ
      if ([...usedPositions].some(p => Math.abs(p - pos) < al.length)) continue;

      // このエイリアスの直後（最大6文字以内）の数字を探す
      const after = text.slice(pos + al.length, pos + al.length + 8);
      const numMatch = after.match(/^\s*(\d+)/);
      const count = numMatch ? Math.min(parseInt(numMatch[1]), 20) : 1;

      matches.push({ id: drink.id, name: drink.name, pos, count });
      for (let i = pos; i < pos + al.length; i++) usedPositions.add(i);
      break; // このdrinkはマッチ済み
    }
  });

  // 位置順にソート
  matches.sort((a,b) => a.pos - b.pos);

  if (matches.length === 0) {
    voiceStatus.className = 'error';
    voiceStatus.textContent = '「' + rawText + '」— 聞き取れませんでした';
    return;
  }

  // ── Step3: 確認モーダルを表示 ──
  pendingOrders = matches;
  showConfirmModal(rawText, matches);
}

/* ── 確認モーダル ── */
function showConfirmModal(rawText, orders) {
  // 既存のモーダルを削除
  const old = document.getElementById('voiceConfirmModal');
  if (old) old.remove();

  const modal = document.createElement('div');
  modal.id = 'voiceConfirmModal';
  modal.style.cssText = `
    position:fixed;inset:0;z-index:300;
    background:rgba(10,10,20,0.88);
    display:flex;align-items:flex-end;justify-content:center;
  `;

  const panel = document.createElement('div');
  panel.style.cssText = `
    background:#16213e;border-radius:20px 20px 0 0;padding:20px 16px 32px;
    width:100%;border-top:2px solid #fd79a8;
  `;

  // タイトル
  const title = document.createElement('div');
  title.style.cssText = 'font-size:0.8rem;font-weight:700;color:#8892a4;text-align:center;margin-bottom:4px;letter-spacing:0.06em;';
  title.textContent = '認識結果の確認';
  panel.appendChild(title);

  const raw = document.createElement('div');
  raw.style.cssText = 'font-size:0.78rem;color:#8892a4;text-align:center;margin-bottom:16px;';
  raw.textContent = '「' + rawText + '」';
  panel.appendChild(raw);

  // 各オーダーの確認行
  orders.forEach((order, idx) => {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;align-items:center;gap:10px;margin-bottom:12px;background:rgba(255,255,255,0.05);border-radius:12px;padding:10px 14px;';

    const nameEl = document.createElement('div');
    nameEl.style.cssText = 'flex:1;font-weight:700;font-size:1rem;';
    nameEl.textContent = order.name;
    row.appendChild(nameEl);

    // ─ 数量を増減できるコントロール ─
    const minus = document.createElement('button');
    minus.textContent = '－';
    minus.style.cssText = 'width:34px;height:34px;border-radius:8px;border:1.5px solid #e94560;background:rgba(233,69,96,0.15);color:#e94560;font-size:1rem;font-weight:900;cursor:pointer;';

    const countEl = document.createElement('div');
    countEl.style.cssText = 'font-family:"Bebas Neue",sans-serif;font-size:2rem;color:#f5a623;min-width:2.5rem;text-align:center;line-height:1;';
    countEl.textContent = order.count;

    const plus = document.createElement('button');
    plus.textContent = '＋';
    plus.style.cssText = 'width:34px;height:34px;border-radius:8px;border:1.5px solid #2ecc71;background:rgba(46,204,113,0.15);color:#2ecc71;font-size:1rem;font-weight:900;cursor:pointer;';

    minus.addEventListener('click', () => {
      if (orders[idx].count > 0) { orders[idx].count--; countEl.textContent = orders[idx].count; }
    });
    plus.addEventListener('click', () => {
      if (orders[idx].count < 20) { orders[idx].count++; countEl.textContent = orders[idx].count; }
    });

    row.appendChild(minus);
    row.appendChild(countEl);
    row.appendChild(plus);
    panel.appendChild(row);
  });

  // ボタン行
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'display:flex;gap:10px;margin-top:6px;';

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = 'キャンセル';
  cancelBtn.style.cssText = 'flex:1;padding:14px;border-radius:12px;border:1.5px solid #8892a4;background:none;color:#8892a4;font-family:"Noto Sans JP",sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;';
  cancelBtn.addEventListener('click', () => {
    modal.remove();
    voiceStatus.className = 'idle';
    voiceStatus.textContent = 'マイクボタンを押して話してください';
  });

  const okBtn = document.createElement('button');
  okBtn.textContent = '✓ 追加する';
  okBtn.style.cssText = 'flex:2;padding:14px;border-radius:12px;border:none;background:#2ecc71;color:#0a2e1a;font-family:"Noto Sans JP",sans-serif;font-size:1rem;font-weight:900;cursor:pointer;';
  okBtn.addEventListener('click', () => {
    modal.remove();
    const confirmed = orders.filter(o => o.count > 0);
    confirmed.forEach(r => addOrder(r.id, r.count));
    voiceResult.innerHTML = '';
    confirmed.forEach(r => {
      const chip = document.createElement('div');
      chip.className = 'result-chip';
      chip.textContent = r.name + ' ＋' + r.count;
      voiceResult.appendChild(chip);
    });
    voiceStatus.className = 'success';
    voiceStatus.textContent = '✓ ' + confirmed.map(r=>r.name+'×'+r.count).join('、') + ' を追加';
    setTimeout(()=>{ voiceStatus.className='idle'; voiceStatus.textContent='マイクボタンを押して話してください'; voiceResult.innerHTML=''; }, 3500);
  });

  btnRow.appendChild(cancelBtn);
  btnRow.appendChild(okBtn);
  panel.appendChild(btnRow);
  modal.appendChild(panel);

  // 背景タップでキャンセル
  modal.addEventListener('click', e => { if(e.target===modal) cancelBtn.click(); });
  document.body.appendChild(modal);

  voiceStatus.className = 'success';
  voiceStatus.textContent = '確認してから「追加する」を押してください';
}

/* ══ EMOJI PICKER ══ */
let emojiTargetId=null;
function openEmojiPicker(id){
  emojiTargetId=id;
  const grid=document.getElementById('emojiGrid'); grid.innerHTML='';
  EMOJI_LIST.forEach(emoji=>{ const btn=document.createElement('div'); btn.className='emoji-choice'; btn.textContent=emoji; btn.addEventListener('click',()=>pickEmoji(emoji)); grid.appendChild(btn); });
  document.getElementById('emojiModal').classList.add('open');
}
function pickEmoji(emoji){
  const d=drinks.find(x=>x.id===emojiTargetId); if(d) d.icon=emoji;
  closeEmoji(); rebuildGrid();
}
function closeEmoji(){ document.getElementById('emojiModal').classList.remove('open'); emojiTargetId=null; }
document.getElementById('btnCloseEmoji').addEventListener('click',closeEmoji);
document.getElementById('emojiModal').addEventListener('click',e=>{ if(e.target===document.getElementById('emojiModal')) closeEmoji(); });

/* ══ MANUAL ══ */
let currentCat='すべて', searchQuery='';
function initManual(){
  const tabsEl=document.getElementById('catTabs');
  CATEGORIES.forEach(cat=>{
    const btn=document.createElement('button'); btn.className='cat-tab'+(cat==='すべて'?' active':''); btn.textContent=cat;
    btn.addEventListener('click',()=>{ currentCat=cat; document.querySelectorAll('.cat-tab').forEach(b=>b.classList.remove('active')); btn.classList.add('active'); renderManualList(); });
    tabsEl.appendChild(btn);
  });
  const si=document.getElementById('searchInput'), cb=document.getElementById('btnClearSearch');
  si.addEventListener('input',()=>{ searchQuery=si.value.trim(); cb.classList.toggle('visible',searchQuery.length>0); renderManualList(); });
  cb.addEventListener('click',()=>{ si.value=''; searchQuery=''; cb.classList.remove('visible'); renderManualList(); });
  renderManualList();
}
function renderManualList(){
  const list=document.getElementById('manualList'), q=searchQuery.toLowerCase();
  let filtered=MANUAL_DATA.filter(m=>{
    if(currentCat!=='すべて'&&m.category!==currentCat) return false;
    if(!q) return true;
    return m.name.toLowerCase().includes(q)||m.steps.some(s=>s.toLowerCase().includes(q));
  });
  list.innerHTML='';
  if(filtered.length===0){ list.innerHTML='<div class="no-result">😕 見つかりませんでした</div>'; return; }
  filtered.forEach(item=>{
    const card=document.createElement('div'); card.className='manual-card'+(q?' highlight':'');
    card.innerHTML=`<div class="manual-card-head"><div class="manual-title-row"><span class="manual-emoji">${item.emoji}</span><span class="manual-name">${highlight(item.name,q)}</span></div><div style="display:flex;align-items:center;gap:8px;"><span class="manual-cat-badge">${item.category}</span><span class="manual-arrow">▶</span></div></div><div class="manual-body"><ul class="manual-steps">${item.steps.map((step,i)=>`<li><span class="step-num">${i+1}</span><span>${highlight(step,q)}</span></li>`).join('')}</ul></div>`;
    if(q) card.classList.add('open');
    card.querySelector('.manual-card-head').addEventListener('click',()=>card.classList.toggle('open'));
    list.appendChild(card);
  });
}
function highlight(text,q){
  if(!q) return esc(text);
  const escaped=esc(text), escapedQ=esc(q).replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
  return escaped.replace(new RegExp(escapedQ,'gi'),m=>`<mark>${m}</mark>`);
}

/* ══ TOAST ══ */
let toastT;
function showToast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2200); }

loadDrinks(); syncRuntime(); rebuildGrid(); renderTotal(); updateAdvice(); initManual();
